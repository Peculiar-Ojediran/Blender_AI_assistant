schema_version = "1.0.0"

id = "blender_ai_assistant"
version = "0.1.4"
name = "Blender AI Assistant"
tagline = "Plan controlled Blender changes with AI providers"
maintainer = "Blender AI Assistant Contributors"
type = "add-on"

tags = ["3D View"]
blender_version_min = "5.1.0"
license = ["SPDX:GPL-3.0-or-later"]
wheels = [
  "./wheels/certifi-2026.6.17-py3-none-any.whl",
  "./wheels/charset_normalizer-3.4.7-py3-none-any.whl",
  "./wheels/fastjsonschema-2.21.1-py3-none-any.whl",
  "./wheels/idna-3.18-py3-none-any.whl",
  "./wheels/requests-2.32.3-py3-none-any.whl",
  "./wheels/urllib3-2.7.0-py3-none-any.whl",
]

[permissions]
network = "Connect to the selected AI provider when planning a request"

[build]
paths_exclude_pattern = [
  "__pycache__/",
  "*.py[cod]",
]
